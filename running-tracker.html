<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Running Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: #222230;
      --accent: #00e676;
      --accent2: #00b0ff;
      --warn: #ff6d00;
      --danger: #f44336;
      --text: #e8eaf0;
      --sub: #7986a0;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
    }

    #timer {
      font-size: 22px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: var(--text);
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--sub);
      transition: background .4s;
      flex-shrink: 0;
    }
    #status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.4s infinite; }
    #status-dot.paused { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Stats bar ── */
    #stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px 6px 14px;
      gap: 4px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      border-radius: var(--radius);
    }

    .stat-val {
      font-size: 24px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--text);
    }

    .stat-unit {
      font-size: 10px;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: .5px;
    }

    .stat.accent .stat-val { color: var(--accent); }
    .stat.blue   .stat-val { color: var(--accent2); }
    .stat.warn   .stat-val { color: var(--warn); }
    .stat.heart  .stat-val { color: #ff4d6d; }

    /* ── Controls ── */
    #controls {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 10px 18px 6px;
      background: var(--panel);
    }

    .btn {
      flex: 1;
      max-width: 160px;
      padding: 12px 10px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, opacity .2s;
      letter-spacing: .5px;
    }
    .btn:active { transform: scale(.95); }

    #btn-start  { background: var(--accent); color: #000; }
    #btn-pause  { background: var(--warn);   color: #000; display: none; }
    #btn-stop   { background: var(--danger); color: #fff; display: none; }
    #btn-heart  { background: var(--border); color: var(--text); font-size: 20px; max-width: 54px; }

    /* ── Voice badge ── */
    #voice-badge {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,.85);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
    }
    #voice-badge.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── GPS accuracy ring on map ── */
    .leaflet-container { font: inherit; }

    /* ── Summary modal ── */
    #modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    #modal.show { display: flex; }

    #modal-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px 28px;
      width: 90%;
      max-width: 380px;
      text-align: center;
    }

    #modal-card h2 { font-size: 22px; margin-bottom: 20px; color: var(--accent); }

    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
    }
    .modal-row span:last-child { font-weight: 700; color: var(--text); }
    .modal-row span:first-child { color: var(--sub); }

    #modal-close {
      margin-top: 22px;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Pace card overlay ── */
    #pace-card {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(10,10,15,.82);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      z-index: 500;
      font-size: 13px;
      color: var(--sub);
      min-width: 130px;
      backdrop-filter: blur(6px);
    }
    #pace-card .pc-val { font-size: 20px; font-weight: 800; color: var(--accent2); }
    #pace-card .pc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; }

    /* Map wrapper needs position:relative for overlay */
    #map-wrap { position: relative; }

    /* ── Responsiveness ── */
    @media (min-width: 600px) {
      #stats { padding: 14px 20px 18px; gap: 8px; }
      .stat-val { font-size: 30px; }
      header h1 { font-size: 22px; }
      #timer { font-size: 26px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="status-dot"></div>
      <h1>&#x1F3C3; RUNNING</h1>
    </div>
    <div id="timer">00:00:00</div>
    <div style="font-size:12px;color:var(--sub);text-align:right">
      <div id="gps-acc">GPS: –</div>
      <div id="voice-state">&#x1F50A; Voz</div>
    </div>
  </header>

  <!-- Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <!-- Pace overlay -->
    <div id="pace-card">
      <div class="pc-label">Ritmo</div>
      <div class="pc-val" id="pace-val">–'–"</div>
      <div class="pc-label">min / km</div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats">
    <div class="stat accent">
      <div class="stat-val" id="s-km">0.00</div>
      <div class="stat-unit">km</div>
      <div class="stat-label">Distancia</div>
    </div>
    <div class="stat blue">
      <div class="stat-val" id="s-speed">0.0</div>
      <div class="stat-unit">km/h</div>
      <div class="stat-label">Velocidad</div>
    </div>
    <div class="stat warn">
      <div class="stat-val" id="s-cal">0</div>
      <div class="stat-unit">kcal</div>
      <div class="stat-label">Calorías</div>
    </div>
    <div class="stat heart">
      <div class="stat-val" id="s-bpm">–</div>
      <div class="stat-unit">bpm</div>
      <div class="stat-label">&#x2665; Pulso</div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="btn" id="btn-start"  onclick="startRun()">&#x25B6; Iniciar</button>
    <button class="btn" id="btn-pause"  onclick="pauseRun()">&#x23F8; Pausa</button>
    <button class="btn" id="btn-stop"   onclick="stopRun()">&#x23F9; Finalizar</button>
    <button class="btn" id="btn-heart"  onclick="connectHR()" title="Conectar pulsómetro BLE">&#x2665;</button>
  </div>

</div>

<!-- Voice badge -->
<div id="voice-badge"></div>

<!-- Summary modal -->
<div id="modal">
  <div id="modal-card">
    <h2>&#x1F3C6; Resumen</h2>
    <div class="modal-row"><span>Distancia</span><span id="m-km">–</span></div>
    <div class="modal-row"><span>Tiempo</span><span id="m-time">–</span></div>
    <div class="modal-row"><span>Ritmo medio</span><span id="m-pace">–</span></div>
    <div class="modal-row"><span>Vel. máx.</span><span id="m-maxspeed">–</span></div>
    <div class="modal-row"><span>Calorías</span><span id="m-cal">–</span></div>
    <div class="modal-row"><span>Pulso medio</span><span id="m-bpm">–</span></div>
    <button id="modal-close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── State ──────────────────────────────────────────────────
const state = {
  running:   false,
  paused:    false,
  startTime: null,
  elapsed:   0,         // ms accumulated before last pause
  pausedAt:  null,
  km:        0,
  speed:     0,
  maxSpeed:  0,
  bpm:       null,
  bpmSum:    0,
  bpmCount:  0,
  calories:  0,
  positions: [],        // [{lat,lng,ts,speed}]
  watchId:   null,
  timerIv:   null,
  lastKmAnn: 0,         // last announced km milestone
  lastPaceAnn: null,    // last announced pace zone
  voiceEnabled: true,
  hrDevice:  null,
  hrChar:    null,
};

// Weight assumption for calorie calc (kg) – can be configured
const WEIGHT_KG = 70;

// ── Map ────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: false })
  .addAttribution('&copy; <a href="https://osm.org/copyright">OSM</a>')
  .addTo(map);

const routeLine = L.polyline([], { color: '#00e676', weight: 4, opacity: .9 }).addTo(map);
let marker = null;

function setMapView(lat, lng) {
  map.setView([lat, lng], map.getZoom() < 15 ? 16 : map.getZoom());
}

function updateMarker(lat, lng, heading) {
  if (!marker) {
    const icon = L.divIcon({
      html: '<div style="width:18px;height:18px;border-radius:50%;background:#00e676;border:3px solid #fff;box-shadow:0 0 10px #00e676"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9],
      className: ''
    });
    marker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
  } else {
    marker.setLatLng([lat, lng]);
  }
}

// ── Haversine distance (km) ────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Calorie estimate (MET running) ─────────────────────────
// MET ≈ 8 for ~8–10 km/h running
function calcCalories(km) {
  const MET = 8;
  const hours = elapsedSeconds() / 3600;
  return Math.round(MET * WEIGHT_KG * hours);
}

// ── Timer ──────────────────────────────────────────────────
function elapsedSeconds() {
  if (!state.startTime) return state.elapsed / 1000;
  return (state.elapsed + Date.now() - state.startTime) / 1000;
}

function formatTime(s) {
  s = Math.floor(s);
  const h = Math.floor(s / 3600).toString().padStart(2,'0');
  const m = Math.floor((s % 3600)/60).toString().padStart(2,'0');
  const ss = (s % 60).toString().padStart(2,'0');
  return `${h}:${m}:${ss}`;
}

function tickTimer() {
  document.getElementById('timer').textContent = formatTime(elapsedSeconds());
  document.getElementById('s-cal').textContent = calcCalories(state.km);
}

// ── Pace ───────────────────────────────────────────────────
function paceStr(speedKmh) {
  if (!speedKmh || speedKmh < 0.5) return '–\'–"';
  const secPerKm = 3600 / speedKmh;
  const m = Math.floor(secPerKm / 60);
  const s = Math.floor(secPerKm % 60).toString().padStart(2,'0');
  return `${m}'${s}"`;
}

// ── GPS handler ────────────────────────────────────────────
function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy, speed: gpsSpeed, heading } = pos.coords;

  document.getElementById('gps-acc').textContent = `GPS: ±${Math.round(accuracy)}m`;

  // Speed: prefer GPS native speed (m/s → km/h), fallback to Haversine
  let speedKmh = 0;
  if (gpsSpeed != null && gpsSpeed >= 0) {
    speedKmh = gpsSpeed * 3.6;
  }

  if (state.positions.length > 0) {
    const prev = state.positions[state.positions.length - 1];
    const d = haversine(prev.lat, prev.lng, lat, lng);
    // Only record if moved more than accuracy filter (15m) to avoid drift
    if (d * 1000 < Math.max(accuracy, 5) && d * 1000 < 15 && !state.positions.length === 0) return;

    if (d > 0.003) { // at least 3m
      state.km += d;
      document.getElementById('s-km').textContent = state.km.toFixed(2);
    }

    // Fallback speed from haversine if GPS speed unavailable
    if (gpsSpeed == null) {
      const dtSec = (Date.now() - prev.ts) / 1000;
      speedKmh = dtSec > 0 ? (d / dtSec) * 3600 : 0;
    }
  }

  // Smooth speed
  state.speed = speedKmh < 60 ? speedKmh : state.speed; // sanity cap
  if (state.speed > state.maxSpeed) state.maxSpeed = state.speed;

  document.getElementById('s-speed').textContent = state.speed.toFixed(1);
  document.getElementById('pace-val').textContent = paceStr(state.speed);

  state.positions.push({ lat, lng, ts: Date.now(), speed: state.speed });
  routeLine.addLatLng([lat, lng]);
  updateMarker(lat, lng, heading);
  setMapView(lat, lng);

  // Voice commentary
  voiceCheck();
}

function onGpsError(err) {
  console.warn('GPS error:', err.message);
  document.getElementById('gps-acc').textContent = 'GPS: error';
}

// ── Voice ──────────────────────────────────────────────────
function speak(text) {
  if (!state.voiceEnabled) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES';
  utt.rate = 1.05;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
  showBadge(text);
}

function showBadge(text) {
  const b = document.getElementById('voice-badge');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), 4000);
}

function paceZone(speedKmh) {
  if (speedKmh < 4)   return 'caminando';
  if (speedKmh < 7)   return 'trote';
  if (speedKmh < 10)  return 'ritmo suave';
  if (speedKmh < 13)  return 'ritmo medio';
  if (speedKmh < 16)  return 'ritmo rápido';
  return 'sprint';
}

function voiceCheck() {
  const km = state.km;
  const sp = state.speed;
  const sec = elapsedSeconds();

  // km milestones
  const nextMile = Math.floor(km);
  if (nextMile > 0 && nextMile > state.lastKmAnn) {
    state.lastKmAnn = nextMile;
    const pace = paceStr(sp);
    const mins = Math.floor(sec / 60);
    speak(`Kilómetro ${nextMile}. Tiempo: ${mins} minutos. Ritmo: ${pace} por kilómetro.`);
    return;
  }

  // Pace zone change
  const zone = paceZone(sp);
  if (zone !== state.lastPaceAnn && sec > 10) {
    state.lastPaceAnn = zone;
    const msgs = {
      'caminando':    'Estás caminando. ¡Vamos, acelera!',
      'trote':        'Buen trote. ¡Mantén el ritmo!',
      'ritmo suave':  'Ritmo suave. ¡Muy bien!',
      'ritmo medio':  'Buen ritmo medio. ¡Sigue así!',
      'ritmo rápido': '¡Ritmo rápido! ¡Excelente!',
      'sprint':       '¡Sprint! ¡Dalo todo!',
    };
    speak(msgs[zone] || zone);
  }

  // BPM comments (if available)
  if (state.bpm) {
    if (state.bpm > 180 && state.lastBpmAnn !== 'max') {
      state.lastBpmAnn = 'max';
      speak('Pulso muy alto. Considera bajar el ritmo.');
    } else if (state.bpm < 130 && state.lastBpmAnn !== 'low') {
      state.lastBpmAnn = 'low';
      speak('Pulso bajo. Puedes aumentar la intensidad.');
    } else {
      state.lastBpmAnn = null;
    }
  }
}

// ── Heart Rate (Web Bluetooth) ─────────────────────────────
async function connectHR() {
  if (!navigator.bluetooth) {
    showBadge('Bluetooth no disponible en este navegador');
    return;
  }
  try {
    showBadge('Buscando pulsómetro...');
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['heart_rate'] }],
      optionalServices: ['heart_rate']
    });
    state.hrDevice = device;
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    state.hrChar  = await service.getCharacteristic('heart_rate_measurement');
    await state.hrChar.startNotifications();
    state.hrChar.addEventListener('characteristicvaluechanged', onHRData);
    showBadge(`✓ Pulsómetro: ${device.name || 'conectado'}`);
  } catch (e) {
    showBadge('No se pudo conectar el pulsómetro');
    console.warn('BLE HR error:', e);
  }
}

function onHRData(event) {
  const val = event.target.value;
  const flags = val.getUint8(0);
  const bpm = (flags & 0x01) ? val.getUint16(1, true) : val.getUint8(1);
  state.bpm = bpm;
  state.bpmSum += bpm;
  state.bpmCount++;
  document.getElementById('s-bpm').textContent = bpm;
}

// ── Controls ───────────────────────────────────────────────
function startRun() {
  if (state.paused) {
    // Resume
    state.startTime = Date.now();
    state.paused = false;
    state.running = true;
    document.getElementById('status-dot').className = 'active';
    document.getElementById('btn-pause').style.display = '';
    document.getElementById('btn-start').style.display = 'none';
    state.timerIv = setInterval(tickTimer, 500);
    speak('Reanudando carrera');
    resumeGPS();
    return;
  }

  // Fresh start
  state.running = true;
  state.startTime = Date.now();
  state.elapsed = 0;
  state.km = 0;
  state.speed = 0;
  state.maxSpeed = 0;
  state.calories = 0;
  state.positions = [];
  state.lastKmAnn = 0;
  state.lastPaceAnn = null;
  state.bpmSum = 0;
  state.bpmCount = 0;
  routeLine.setLatLngs([]);

  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-pause').style.display = '';
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('status-dot').className = 'active';

  state.timerIv = setInterval(tickTimer, 500);

  navigator.geolocation.getCurrentPosition(pos => {
    onPosition(pos);
    startGPS();
    speak('Carrera iniciada. ¡Buena suerte!');
  }, onGpsError, { enableHighAccuracy: true, timeout: 10000 });
}

function startGPS() {
  state.watchId = navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 8000,
  });
}

function resumeGPS() {
  if (state.watchId != null) navigator.geolocation.clearWatch(state.watchId);
  startGPS();
}

function pauseRun() {
  state.paused = true;
  state.running = false;
  state.elapsed += Date.now() - state.startTime;
  state.startTime = null;
  clearInterval(state.timerIv);
  if (state.watchId != null) navigator.geolocation.clearWatch(state.watchId);
  document.getElementById('status-dot').className = 'paused';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').textContent = '▶ Reanudar';
  document.getElementById('btn-start').style.display = '';
  speak('Carrera pausada');
}

function stopRun() {
  state.running = false;
  state.paused = false;
  if (state.startTime) state.elapsed += Date.now() - state.startTime;
  clearInterval(state.timerIv);
  if (state.watchId != null) navigator.geolocation.clearWatch(state.watchId);
  document.getElementById('status-dot').className = '';
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-start').textContent = '▶ Iniciar';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';

  const totalSec = state.elapsed / 1000;
  const avgPace = state.km > 0 ? paceStr(state.km / (totalSec / 3600)) : '–';
  const avgBpm  = state.bpmCount > 0 ? Math.round(state.bpmSum / state.bpmCount) + ' bpm' : '–';

  document.getElementById('m-km').textContent      = state.km.toFixed(2) + ' km';
  document.getElementById('m-time').textContent    = formatTime(totalSec);
  document.getElementById('m-pace').textContent    = avgPace + ' /km';
  document.getElementById('m-maxspeed').textContent= state.maxSpeed.toFixed(1) + ' km/h';
  document.getElementById('m-cal').textContent     = calcCalories(state.km) + ' kcal';
  document.getElementById('m-bpm').textContent     = avgBpm;

  document.getElementById('modal').classList.add('show');

  const summary = `Carrera finalizada. ${state.km.toFixed(2)} kilómetros en ${formatTime(totalSec)}. Ritmo medio: ${avgPace} por kilómetro.`;
  speak(summary);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ── Voice toggle ───────────────────────────────────────────
document.getElementById('voice-state').addEventListener('click', () => {
  state.voiceEnabled = !state.voiceEnabled;
  document.getElementById('voice-state').textContent = state.voiceEnabled ? '🔊 Voz' : '🔇 Silencio';
  if (state.voiceEnabled) speak('Voz activada');
});

// ── Initial map position ───────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
  }, () => {
    map.setView([40.416775, -3.703790], 13); // Madrid fallback
  }, { timeout: 6000 });
} else {
  map.setView([40.416775, -3.703790], 13);
}
</script>
</body>
</html>
