<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Email Etama</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial,sans-serif; background:#f0faf4; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:white; border-radius:16px; padding:40px; max-width:500px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,0.1); }
  h2 { color:#1a3a2a; margin-bottom:8px; }
  p { color:#666; font-size:14px; margin-bottom:28px; }
  #btn { width:100%; background:#2d6a4f; color:white; border:none; border-radius:50px; padding:16px; font-size:16px; font-weight:600; cursor:pointer; }
  #btn:disabled { opacity:0.5; cursor:not-allowed; }
  #log { margin-top:20px; padding:16px; border-radius:10px; font-size:13px; font-family:monospace; white-space:pre-wrap; word-break:break-all; display:none; }
</style>
</head>
<body>
<div class="card">
  <h2>Test Email Etama</h2>
  <p>Pulsa para enviar email de prueba a <strong>gaetanomans92@gmail.com</strong></p>
  <button id="btn">Enviar email de prueba</button>
  <div id="log"></div>
</div>
<script>
document.getElementById("btn").addEventListener("click", async function() {
  var btn = document.getElementById("btn");
  var log = document.getElementById("log");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  function setLog(msg, bg, color, border) {
    log.textContent = msg;
    log.style.display = "block";
    log.style.background = bg;
    log.style.color = color;
    log.style.border = "1px solid " + border;
  }

  var PK  = "ZvrcbYXijlj1r-iGp";
  var SID = "service_5yy5g3c";
  var TR  = "template_9qp11oi";
  var TC  = "template_2d1mmh5";

  try { emailjs.init({ publicKey: PK }); } catch(e) {
    setLog("ERROR init: " + e.message, "#fde8e8","#8b0000","#f5c6c6");
    btn.disabled=false; btn.textContent="Reintentar"; return;
  }

  var data = {
    ref:"ETM-TEST99", date:"Jueves 13 marzo 2026", time:"14:00",
    guests:"2", zone:"Interior", name:"Test Usuario",
    fname:"Gaetano", lname:"Test", email:"gaetanomans92@gmail.com",
    phone:"+34 600 000 000", comments:"Prueba sistema reservas",
    to_email:"gaetanomans92@gmail.com", to_name:"Gaetano"
  };

  try {
    setLog("Enviando al restaurante...", "#e8f0fe","#1a237e","#c5cae9");
    var r1 = await emailjs.send(SID, TR, data);
    setLog("Email restaurante OK ("+r1.status+"). Enviando al cliente...", "#e8f0fe","#1a237e","#c5cae9");
  } catch(e) {
    setLog("ERROR restaurante - Status: " + e.status + " - " + e.text, "#fde8e8","#8b0000","#f5c6c6");
    btn.disabled=false; btn.textContent="Reintentar"; return;
  }

  try {
    var r2 = await emailjs.send(SID, TC, data);
    setLog("AMBOS EMAILS ENVIADOS OK!\nStatus: "+r2.status+"\n\nRevisa gaetanomans92@gmail.com\n(mira tambien SPAM)", "#e8f5ee","#1a3a2a","#b7e4c7");
  } catch(e) {
    setLog("ERROR cliente - Status: " + e.status + " - " + e.text, "#fde8e8","#8b0000","#f5c6c6");
  }

  btn.disabled=false; btn.textContent="Enviar de nuevo";
});
</script>
</body>
</html>
